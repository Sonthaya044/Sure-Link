<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SureLink | ชัวร์ ลิงค์</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700;900&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        :root {
            --color-primary: 2 132 199; --color-tertiary: 5 150 105; --color-tertiary-container: 209 250 229;
            --color-background: 237 242 247; --color-surface: 247 250 252; --color-surface-container: 226 232 240;
            --color-surface-container-low: 247 250 252; --color-surface-container-highest: 203 213 225;
            --color-surface-bright: 237 242 247; --color-surface-strong: 148 163 184; --color-surface-soft: 226 232 240;
            --color-on-surface: 30 41 59; --color-on-surface-variant: 71 85 105; --color-outline: 203 213 225;
            --color-outline-variant: 148 163 184; --color-error: 239 68 68; --color-warning: 245 158 11; --color-success: 16 185 129;
        }
        html.dark {
            --color-primary: 155 209 255; --color-tertiary: 78 222 163; --color-tertiary-container: 14 59 44;
            --color-background: 6 20 40; --color-surface: 12 29 54; --color-surface-container: 12 31 60;
            --color-surface-container-low: 8 23 47; --color-surface-container-highest: 18 34 63;
            --color-surface-bright: 32 58 101; --color-surface-strong: 17 39 67; --color-surface-soft: 17 29 48;
            --color-on-surface: 228 235 255; --color-on-surface-variant: 163 176 208; --color-outline: 63 77 106;
            --color-outline-variant: 63 77 106; --color-error: 255 122 122; --color-warning: 240 181 100; --color-success: 52 211 153;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1; }
        body.modal-open { overflow: hidden; }
    </style>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: {
            "primary": "rgb(var(--color-primary))", "tertiary": "rgb(var(--color-tertiary))", "background": "rgb(var(--color-background))",
            "surface": "rgb(var(--color-surface))", "surface-container": "rgb(var(--color-surface-container))",
            "surface-container-low": "rgb(var(--color-surface-container-low))", "surface-container-highest": "rgb(var(--color-surface-container-highest))",
            "on-surface": "rgb(var(--color-on-surface))", "on-surface-variant": "rgb(var(--color-on-surface-variant))",
            "outline": "rgb(var(--color-outline))", "error": "rgb(var(--color-error))", "warning": "rgb(var(--color-warning))", "success": "rgb(var(--color-success))"
        }, fontFamily: { "headline": ["Space Grotesk", "Prompt", "sans-serif"], "body": ["Inter", "Prompt", "sans-serif"] } } } }
    </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen overflow-x-hidden transition-colors duration-300 flex flex-col justify-between">
    <nav class="fixed inset-x-0 top-4 z-[60] mx-auto flex w-[95%] max-w-7xl items-center justify-between rounded-[2rem] border border-outline/50 bg-surface/95 px-4 sm:px-6 py-3 sm:py-4 shadow-xl backdrop-blur-xl">
        <a href="{{ url_for('index') }}" class="flex items-center gap-2 sm:gap-3 min-w-0 hover:opacity-80 transition-opacity">
            <div class="flex h-10 w-10 sm:h-12 sm:w-12 shrink-0 items-center justify-center rounded-xl sm:rounded-3xl bg-tertiary/15 text-tertiary shadow-lg">
                <span class="material-symbols-outlined text-xl sm:text-2xl">security</span>
            </div>
            <div class="flex flex-col min-w-0">
                <p class="truncate text-[10px] sm:text-sm uppercase tracking-[0.2em] text-tertiary font-semibold">SureLink</p>
                <h1 class="truncate text-base sm:text-xl font-bold text-on-surface leading-tight">URL Threat Intelligence</h1>
            </div>
        </a>
        
        <div class="hidden items-center gap-6 md:flex shrink-0">
            <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}text-tertiary border-b-2 border-tertiary pb-1 font-semibold{% else %}text-on-surface-variant hover:text-tertiary transition{% endif %}">หน้าแรก</a>
            <a href="{{ url_for('history') }}" class="nav-link {% if request.endpoint == 'history' %}text-tertiary border-b-2 border-tertiary pb-1 font-semibold{% else %}text-on-surface-variant hover:text-tertiary transition{% endif %}">ประวัติ</a>
            <div class="h-6 w-[1px] bg-outline/50"></div>
            <button onclick="toggleTheme()" class="flex h-10 w-10 items-center justify-center rounded-full bg-surface-container-highest text-on-surface-variant transition hover:text-primary">
                <span class="material-symbols-outlined" id="themeIconDesktop">dark_mode</span>
            </button>
        </div>

        <button onclick="toggleMobileNav()" class="inline-flex h-10 w-10 sm:h-11 sm:w-11 shrink-0 items-center justify-center rounded-full border border-outline/50 bg-surface-bright text-on-surface shadow-md transition hover:bg-surface-strong md:hidden">
            <span class="material-symbols-outlined">menu</span>
        </button>

        <div id="mobileNav" class="absolute right-2 sm:right-6 top-[110%] hidden w-56 rounded-[1.5rem] border border-outline/50 bg-surface p-2 shadow-2xl md:hidden">
            <a href="{{ url_for('index') }}" class="block w-full rounded-xl px-4 py-3 text-left text-sm font-medium text-on-surface-variant hover:bg-on-surface/5 hover:text-primary transition">หน้าแรก</a>
            <a href="{{ url_for('history') }}" class="block w-full rounded-xl px-4 py-3 text-left text-sm font-medium text-on-surface-variant hover:bg-on-surface/5 hover:text-primary transition">ประวัติ</a>
            <div class="my-1 border-t border-outline/30"></div>
            <button onclick="toggleTheme()" class="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left text-sm font-medium text-on-surface-variant hover:bg-on-surface/5 hover:text-primary transition">
                <span class="material-symbols-outlined text-[20px]" id="themeIconMobile">dark_mode</span> สลับโหมดสี
            </button>
        </div>
    </nav>

    <main class="pt-32 md:pt-36 w-full flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-outline/50 bg-surface-container-low mt-auto w-full">
        <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-6 sm:py-8 text-xs sm:text-sm text-on-surface-variant md:flex-row md:items-center md:justify-between text-center md:text-left">
            <p>© 2026 SureLink ระบบสแกนและประเมินความเสี่ยง URL.</p>
        </div>
    </footer>

    <div id="toast-container" class="fixed bottom-6 right-4 sm:right-6 z-[100] flex flex-col gap-3 pointer-events-none w-[calc(100%-2rem)] sm:w-auto"></div>

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
